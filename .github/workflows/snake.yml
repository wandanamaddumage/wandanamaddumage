cat > .github/workflows/snake.yml << 'EOF'
name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install svgwrite

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: wandanamaddumage
          outputs: |
            dist/snake-base.svg

      - name: Apply cyber theme
        run: |
          python << 'INNEREOF'
          import re
          
          with open('dist/snake-base.svg', 'r') as f:
              content = f.read()
          
          color_map = {
              '#ebedf0': '#0a0e27',
              '#9be9a8': '#30344d',
              '#40c463': '#004980',
              '#30a14e': '#0088bf',
              '#216e39': '#00c8ff',
          }
          
          for old, new in color_map.items():
              content = content.replace(old, new)
          
          glow_filter = '''
          <defs>
              <filter id="glowSmall" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="2" result="blur"/>
                  <feMerge>
                      <feMergeNode in="blur"/>
                      <feMergeNode in="SourceGraphic"/>
                  </feMerge>
              </filter>
          </defs>
          '''
          content = content.replace('<svg', '<svg' + glow_filter, 1)
          
          content = re.sub(
              r'<path[^>]*class="[^"]*snake[^"]*"[^>]*>',
              lambda m: m.group(0).replace('fill="', 'fill="#00c8ff" filter="url(#glowSmall)" '),
              content
          )
          
          with open('dist/github-contribution-grid-snake-cyber.svg', 'w') as f:
              f.write(content)
          INNEREOF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
EOF
